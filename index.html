<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Missing Assignments</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent;
    color: #f5f5f5;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    padding: 12px 14px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 10px;
    letter-spacing: 0.3px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
  }
  .empty { color: #8fd19e; font-size: 16px; padding: 8px 0; }
  .err   { color: #f5a5a5; font-size: 14px; padding: 8px 0; }
  ul { list-style: none; }
  li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  li:last-child { border-bottom: none; }
  .badge {
    flex: 0 0 auto;
    min-width: 38px;
    text-align: center;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    background: #4a4a4a;
    color: #fff;
  }
  .badge.warn { background: #d97706; }
  .badge.late { background: #dc2626; }
  .info { flex: 1; min-width: 0; overflow: hidden; }
  .assignment {
    font-size: 15px; font-weight: 500; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .class {
    font-size: 12px; color: #b8b8b8; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  /* Fallback dark background when viewed standalone (not in DakBoard) */
  @media (prefers-color-scheme: light) {
    html, body { background: #1a1a1a; }
  }
</style>
</head>
<body>
  <h1>Missing Assignments</h1>
  <div id="root">Loading…</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTHFoTPmvQaBeXaaNfugtrs3cJ81vbmuuAtOLoZClXbwJThArBVIPzRTUu-cayiHfMgGJigln_amwYG/pub?gid=1525113838&single=true&output=csv';

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function render(rows) {
  const headerIdx = rows.findIndex(r => r[0] && r[0].trim() === 'Class');
  const dataRows = headerIdx >= 0 ? rows.slice(headerIdx + 1) : [];
  const items = dataRows
    .filter(r => r[2] && (r[6] || '').toLowerCase() === 'missing')
    .map(r => ({
      class: (r[0] || '').replace(/\s*S\d\s*$/, '').trim(),
      assignment: (r[2] || '').trim(),
      days: parseInt(r[4], 10) || 0
    }))
    .sort((a, b) => b.days - a.days);

  const root = document.getElementById('root');
  if (items.length === 0) {
    root.innerHTML = '<div class="empty">All caught up! 🎉</div>';
    return;
  }
  const html = '<ul>' + items.map(a => {
    const cls = a.days >= 14 ? 'late' : (a.days >= 5 ? 'warn' : '');
    return '<li><span class="badge ' + cls + '">' + a.days + 'd</span>' +
           '<div class="info"><div class="assignment">' + escapeHTML(a.assignment) + '</div>' +
           '<div class="class">' + escapeHTML(a.class) + '</div></div></li>';
  }).join('') + '</ul>';
  root.innerHTML = html;
}

function load() {
  fetch(CSV_URL + '&_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(t => render(parseCSV(t)))
    .catch(e => {
      document.getElementById('root').innerHTML =
        '<div class="err">Couldn\'t load assignments: ' + escapeHTML(e.message) + '</div>';
    });
}

load();
setInterval(load, 15 * 60 * 1000);
</script>
</body>
</html>
